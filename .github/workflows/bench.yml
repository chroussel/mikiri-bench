name: bench

on:
  schedule:
    - cron: "0 6 * * 1" # weekly on Monday at 06:00 UTC
  workflow_dispatch:
    inputs:
      models:
        description: "Comma-separated list of models to bench (leave empty for all)"
        required: false
  push:
    branches: [main]

env:
  MIKIRI_API_KEY: ${{ secrets.MIKIRI_API_KEY }}

jobs:
  bench:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model:
          - gpt-5.3-codex-xhigh
          - claude-opus-4-6
          - glm-5

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup mikiri
        uses: ./.github/actions/setup-mikiri
        with:
          api-key: ${{ secrets.MIKIRI_API_KEY }}

      - name: Run benchmark (${{ matrix.model }})
        env:
          DATABASE_URL: postgresql+psycopg://postgres:test@localhost:5432/test
        run: |
          set -euo pipefail
          MODEL="${{ matrix.model }}"

          for case_dir in cases/*/; do
            case_name="$(basename "$case_dir")"
            echo "::group::$case_name"

            manifest="$case_dir/manifest.json"
            if [[ ! -f "$manifest" ]]; then
              echo "Skipping $case_name (no manifest.json)"
              echo "::endgroup::"
              continue
            fi

            db=$(python3 -c "import json; print(json.load(open('$manifest'))['db'])")
            seed_cmd=$(python3 -c "import json; print(json.load(open('$manifest'))['seed'])")

            # Reset PostgreSQL database for pg cases
            if [[ "$db" == "postgresql" ]]; then
              PGPASSWORD=test psql -h localhost -U postgres -c "DROP DATABASE IF EXISTS test;" 2>/dev/null
              PGPASSWORD=test psql -h localhost -U postgres -c "CREATE DATABASE test;" 2>/dev/null
            fi

            # Set up virtualenv and install deps
            if [[ ! -d "$case_dir/.venv" ]]; then
              python3 -m venv "$case_dir/.venv"
              "$case_dir/.venv/bin/pip" install -q -r "$case_dir/requirements.txt"
            fi

            # Seed
            (cd "$case_dir" && .venv/bin/python seed.py)

            # Run mikiri with model override
            mkdir -p "results/$MODEL/$case_name"
            (cd "$case_dir" && mikiri run --json --model "$MODEL" \
              > "../../results/$MODEL/$case_name/output.json" \
              2>"../../results/$MODEL/$case_name/stderr.log") || true

            # Copy report if generated
            if [[ -f "$case_dir/mikiri_report.md" ]]; then
              cp "$case_dir/mikiri_report.md" "results/$MODEL/$case_name/report.md"
            fi

            echo "::endgroup::"
          done

      - name: Score results (${{ matrix.model }})
        run: python3 score.py --model "${{ matrix.model }}"

      - name: Generate scorecard JSON
        run: python3 score.py --model "${{ matrix.model }}" --json > "results/${{ matrix.model }}/scorecard.json"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.model }}-${{ github.run_number }}
          path: results/${{ matrix.model }}/
          retention-days: 90

  dashboard:
    needs: bench
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: results/
          pattern: bench-*
          merge-multiple: false

      - name: Build dashboard
        run: |
          # Checkout existing history from gh-pages
          git worktree add /tmp/gh-pages gh-pages 2>/dev/null || {
            git worktree add --detach /tmp/gh-pages
            cd /tmp/gh-pages
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
            echo '{}' > history.json
            git add history.json
            git commit -m "init gh-pages"
          }

          # Merge all model scorecards into history
          python3 -c "
          import json, datetime, glob

          history_path = '/tmp/gh-pages/history.json'
          try:
              with open(history_path) as f:
                  history = json.load(f)
          except (FileNotFoundError, json.JSONDecodeError):
              history = {}

          # history is { model: [ {date, ...}, ... ] }
          for scorecard_path in glob.glob('results/bench-*/scorecard.json'):
              with open(scorecard_path) as f:
                  scorecard = json.load(f)

              model = scorecard.get('model', 'unknown')
              scorecard['date'] = datetime.date.today().isoformat()
              scorecard['run_number'] = ${{ github.run_number }}

              if model not in history:
                  history[model] = []
              history[model].append(scorecard)
              history[model] = history[model][-365:]

          with open(history_path, 'w') as f:
              json.dump(history, f, indent=2)
          "

          # Generate dashboard HTML
          python3 dashboard.py /tmp/gh-pages/history.json /tmp/gh-pages/index.html

          # Copy latest scorecards
          for f in results/bench-*/scorecard.json; do
            model=$(basename "$(dirname "$f")" | sed 's/^bench-//' | sed 's/-[0-9]*$//')
            cp "$f" "/tmp/gh-pages/latest-${model}.json" 2>/dev/null || true
          done

      - name: Deploy to GitHub Pages
        run: |
          cd /tmp/gh-pages
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "bench results ${{ github.run_number }}"
          git push origin gh-pages
